name: Windows-11-Cloudflare
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
    - name: 1. Tai Cloudflared
      run: |
        curl -L --output cloudflared.exe https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe

    - name: 2. Dat mat khau
      run: |
        net user runneradmin YourPassword123
        echo "Mat khau: YourPassword123"

    - name: 3. Cau hinh Windows RDP (Sua loi Bad Handshake)
      run: |
        # Cho phep RDP qua Registry
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        
        # Tat NLA (Bat buoc de Linux/Remmina ket noi duoc)
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
        
        # Mo Firewall cho cong 3389
        New-NetFirewallRule -DisplayName "RDP-In" -Direction Inbound -LocalPort 3389 -Protocol TCP -Action Allow -ErrorAction SilentlyContinue
        
        # Ep dich vu TermService chay
        Set-Service TermService -StartupType Automatic
        Restart-Service TermService -Force

    - name: 4. Chay Cloudflare Tunnel
      run: |
        # Kiem tra xem cong 3389 da mo chua truoc khi chay tunnel
        while (!(Test-NetConnection localhost -Port 3389).TcpTestSucceeded) { 
          echo "Dang cho dich vụ RDP khoi dong..."
          Start-Sleep -s 5 
        }
        
        # Chay tunnel
        Start-Process ".\cloudflared.exe" -ArgumentList "tunnel --url rdp://localhost:3389" -RedirectStandardError "cloudflare.log"
        echo "Dang khoi tao Tunnel..."
        Start-Sleep -s 30

    - name: 5. Lay link ket noi
      run: |
        $link = Get-Content cloudflare.log | Select-String -Pattern "https://[a-z0-9-.]*trycloudflare.com" | ForEach-Object { $_.Matches.Value }
        if ($link) {
          echo "=============================================="
          echo "LINK CUA BAN: $($link.Replace('https://', ''))"
          echo "USER: runneradmin | PASS: YourPassword123"
          echo "=============================================="
        } else {
          Get-Content cloudflare.log
        }

    - name: 6. Giu phien chay
      run: while($true) { Start-Sleep -s 60 }
