name: Windows-11-Cloudflare

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    - name: 1. Cai dat Cloudflared
      run: choco install cloudflared

    - name: 2. Dat mat khau cho May ao
      run: |
        net user runneradmin YourPassword123
        echo "Mat khau: YourPassword123"

    - name: 3. Bat Remote Desktop (RDP)
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

    - name: 4. Chay Cloudflare Tunnel
      run: |
        # Chạy tunnel trực tiếp không cần login
        Start-Process cloudflared -ArgumentList "tunnel --url rdp://localhost:3389 --logfile cloudflare.log"
        echo "Dang khoi tao Tunnel (30 giay)..."
        Start-Sleep -s 30

    - name: 5. Lay link ket noi
      run: |
        # Tim link .trycloudflare.com trong file log
        $link = Get-Content cloudflare.log | Select-String -Pattern "https://[a-z0-9-.]*trycloudflare.com" | ForEach-Object { $_.Matches.Value }
        echo "=============================================="
        echo "LINK KET NOI CUA BAN:"
        echo $link.Replace("https://", "")
        echo "USER: runneradmin"
        echo "PASSWORD: YourPassword123"
        echo "=============================================="

    - name: 6. Giu phien chay
      run: while($true) { Start-Sleep -s 60 }
